name: ☕️ AI Geek Morning Post

# 触发条件配置
on:
  schedule:
    # 这里的关键：GitHub 服务器使用的是 UTC (世界标准时间)。
    # 北京时间早上 8:30，减去 8 小时时差，就是 UTC 时间的凌晨 0:30。
    # Cron 语法格式：分 时 日 月 星期
    - cron: '30 0 * * *'
  workflow_dispatch: # 保留这个，允许你在 GitHub 网页上手动点击运行，方便测试

jobs:
  run-agent:
    runs-on: ubuntu-latest # 使用最新的 Linux 容器

    steps:
      - name: 📥 检出代码 (Checkout Repository)
        uses: actions/checkout@v3

      - name: 🐍 配置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # 稳定版本

      - name: 📦 安装核心依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 唤醒 AI 智能体并推送
        env:
          # 从 GitHub 的加密保险箱中读取你的密钥
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BARK_URL: ${{ secrets.BARK_URL }}
        run: python main.py